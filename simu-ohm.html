<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loi d'Ohm - Laboratoire Virtuel Complet</title>
    
    <!-- Moteur de rendu MathJax (LaTeX) -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Chart.js pour le graphique -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #e91e63; 
            --secondary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --ai: #8b5cf6;
            --wire: #334155;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            animation: fadeIn 0.6s ease-out;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border-top: 5px solid var(--primary);
        }

        .full-width { grid-column: 1 / -1; }

        h2 { color: var(--primary); margin-top: 0; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }

        /* Schéma */
        .schematic-container {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px;
            position: relative;
        }

        .electron { fill: #fbbf24; visibility: hidden; }
        .label-val { font-weight: bold; font-size: 14px; fill: var(--secondary); }

        /* Contrôles */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .btn-action {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            text-align: center;
        }

        .btn-save { background: var(--secondary); }
        .btn-ai { background: var(--ai); }
        .btn-save:hover { opacity: 0.9; transform: scale(1.02); }

        /* Table & Graph */
        .table-container {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        th { background: #f1f5f9; position: sticky; top: 0; }

        #aiResponse {
            background: #f5f3ff;
            border-left: 4px solid var(--ai);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.95rem;
            display: none;
        }
    </style>
</head>
<body>

    <h1 style="color: var(--primary); margin-bottom: 20px;">⚡ Laboratoire Virtuel : Loi d'Ohm</h1>

    <div class="container">
        
        <!-- Colonne Gauche : Circuit et Contrôles -->
        <div class="card">
            <h2>Circuit Interactif</h2>
            <div class="schematic-container">
                <svg viewBox="0 0 300 200" width="100%">
                    <path id="electron-path" d="M 50 100 L 50 50 L 250 50 L 250 150 L 50 150 L 50 100" fill="none" />
                    <path d="M 50 150 L 50 50 L 250 50 L 250 150 L 50 150" stroke="var(--wire)" stroke-width="2" fill="none" />
                    
                    <!-- Electrons -->
                    <circle class="electron" r="3"><animateMotion id="anim1" dur="2s" repeatCount="indefinite"><mpath href="#electron-path"/></animateMotion></circle>
                    <circle class="electron" r="3"><animateMotion id="anim2" dur="2s" repeatCount="indefinite" begin="0.5s"><mpath href="#electron-path"/></animateMotion></circle>
                    <circle class="electron" r="3"><animateMotion id="anim3" dur="2s" repeatCount="indefinite" begin="1s"><mpath href="#electron-path"/></animateMotion></circle>
                    
                    <!-- Composants -->
                    <circle cx="50" cy="100" r="20" fill="white" stroke="var(--wire)" stroke-width="2" />
                    <text x="42" y="105" font-size="12">G</text>
                    <text x="35" y="70" class="label-val" id="val-u">0V</text>

                    <circle cx="150" cy="50" r="15" fill="white" stroke="var(--wire)" stroke-width="2" />
                    <text x="144" y="55" font-size="10">A</text>
                    <text x="135" y="30" class="label-val" id="val-i">0A</text>

                    <rect x="230" y="85" width="40" height="30" fill="white" stroke="var(--wire)" stroke-width="2" />
                    <text x="235" y="75" class="label-val" id="val-r">0Ω</text>
                </svg>
            </div>

            <div class="controls">
                <div class="slider-group">
                    <div class="slider-header">
                        <span>Tension (U)</span>
                        <span id="label-u-slider">12 V</span>
                    </div>
                    <input type="range" id="slider-u" min="0" max="30" step="0.5" value="12" oninput="updateCalcul()">
                </div>

                <div class="slider-group">
                    <div class="slider-header">
                        <span>Résistance (R)</span>
                        <span id="label-r-slider">100 Ω</span>
                    </div>
                    <input type="range" id="slider-r" min="10" max="1000" step="10" value="100" oninput="updateCalcul()">
                </div>

                <button class="btn-action btn-save" onclick="saveMeasure()">📥 Ajouter au registre de mesures</button>
                <button class="btn-action btn-ai" onclick="analyserAI()">✨ Analyse intelligente (Gemini)</button>
                
                <div id="aiResponse"></div>
            </div>
        </div>

        <!-- Colonne Droite : Graphique et Registre -->
        <div class="card">
            <h2>Graphique : \( U = f(I) \)</h2>
            <canvas id="ohmChart" height="200"></canvas>
            
            <h2 style="margin-top:20px;">Registre de mesures</h2>
            <div class="table-container">
                <table id="measureTable">
                    <thead>
                        <tr>
                            <th>Mesure</th>
                            <th>U (V)</th>
                            <th>I (mA)</th>
                            <th>R (Ω)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Rempli par JS -->
                    </tbody>
                </table>
            </div>
            <button class="btn-action" style="background:#64748b; margin-top:10px; width:auto; font-size:0.8rem;" onclick="clearMeasures()">Effacer tout</button>
        </div>

    </div>

    <script>
        const apiKey = "";
        let measures = [];
        let chart;

        // Initialisation du graphique
        function initChart() {
            const ctx = document.getElementById('ohmChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: 'Points de mesure',
                        data: [],
                        backgroundColor: '#e91e63',
                        borderColor: '#e91e63',
                        showLine: true,
                        tension: 0.1
                    }]
                },
                options: {
                    scales: {
                        x: { title: { display: true, text: 'Intensité I (mA)' }, min: 0 },
                        y: { title: { display: true, text: 'Tension U (V)' }, min: 0 }
                    }
                }
            });
        }

        function updateCalcul() {
            const u = parseFloat(document.getElementById('slider-u').value);
            const r = parseFloat(document.getElementById('slider-r').value);
            const i = u / r;

            // Update Labels
            document.getElementById('label-u-slider').innerText = u + " V";
            document.getElementById('label-r-slider').innerText = r + " Ω";
            
            // Update Circuit SVG
            document.getElementById('val-u').textContent = u + "V";
            document.getElementById('val-r').textContent = r + "Ω";
            document.getElementById('val-i').textContent = (i < 1 ? (i * 1000).toFixed(1) + "mA" : i.toFixed(2) + "A");

            // Update Electrons Speed
            const electrons = document.querySelectorAll('.electron');
            const anims = [document.getElementById('anim1'), document.getElementById('anim2'), document.getElementById('anim3')];
            
            if (i > 0) {
                electrons.forEach(el => el.style.visibility = 'visible');
                let speed = Math.max(0.1, 2 / (i * 10 + 0.1)); 
                speed = Math.min(5, speed);
                anims.forEach(a => a.setAttribute('dur', speed + 's'));
            } else {
                electrons.forEach(el => el.style.visibility = 'hidden');
            }
        }

        function saveMeasure() {
            const u = parseFloat(document.getElementById('slider-u').value);
            const r = parseFloat(document.getElementById('slider-r').value);
            const i_ma = (u / r) * 1000;

            const m = { x: i_ma.toFixed(1), y: u };
            measures.push({ u, r, i: i_ma.toFixed(1) });
            
            // Update Table
            const tbody = document.querySelector('#measureTable tbody');
            const row = tbody.insertRow(0);
            row.innerHTML = `<td>#${measures.length}</td><td>${u}V</td><td>${i_ma.toFixed(1)}</td><td>${r}</td>`;

            // Update Chart
            chart.data.datasets[0].data.push(m);
            chart.data.datasets[0].data.sort((a, b) => a.x - b.x); // Trier pour tracer la ligne
            chart.update();
        }

        function clearMeasures() {
            measures = [];
            document.querySelector('#measureTable tbody').innerHTML = "";
            chart.data.datasets[0].data = [];
            chart.update();
        }

        async function analyserAI() {
            const respBox = document.getElementById('aiResponse');
            const u = document.getElementById('slider-u').value;
            const r = document.getElementById('slider-r').value;
            const i = (u/r).toFixed(4);

            respBox.style.display = "block";
            respBox.innerHTML = "<em>L'IA analyse vos données...</em>";

            const prompt = `L'élève a configuré U = ${u}V et R = ${r}Ω, ce qui donne I = ${i}A. 
            Explique brièvement (en tant que prof) si ce courant est fort ou faible pour un circuit scolaire, et donne un exemple d'objet du quotidien qui utiliserait de telles valeurs.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                respBox.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                respBox.innerText = "Erreur lors de l'appel à l'IA.";
            }
        }

        window.onload = () => {
            initChart();
            updateCalcul();
        };
    </script>
</body>
</html>
